<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAM Kurtarıcıları</title>
    <style>
        /* Genel Ayarlar ve Arka Plan Gradyanı */
        body { 
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(to bottom, #eef2f5, #9b8cbf, #473261); 
            height: 100vh; display: flex; overflow: hidden;
        }
        
        /* Sol Menü (Sidebar) */
        .sidebar { 
            width: 200px; background: rgba(240, 240, 245, 0.8); 
            padding: 30px 20px; display: flex; flex-direction: column; gap: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        .sidebar h2 { margin: 0 0 30px 0; font-size: 18px; color: #333; display: flex; align-items: center; gap: 5px; }
        .menu-item { font-size: 14px; font-weight: bold; color: #555; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .menu-item:hover { color: #000; }

        /* Ana İçerik Alanı */
        .main-content { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

        /* Ekran 1: Analiz Başlatma */
        #ekran-1 { text-align: center; display: block; }
        h1 { font-size: 22px; color: #111; margin-bottom: 30px; }
        .input-group { 
            background: white; border-radius: 25px; padding: 10px 20px; 
            display: flex; align-items: center; width: 400px; margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .input-group input { border: none; outline: none; flex: 1; font-size: 14px; }
        .baslat-btn { 
            background: linear-gradient(to right, #6b8dd6, #8e37d7); color: white; 
            border: none; padding: 15px 40px; border-radius: 25px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .baslat-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }

        /* Ekran 2: Sonuç Ekranı (Başlangıçta Gizli) */
        #ekran-2 { text-align: center; display: none; }
        .tarih { color: #555; font-size: 12px; margin-bottom: 30px; }
        
        /* Kırmızı Halka Grafiği */
        .grafik-halka {
            width: 120px; height: 120px; border-radius: 50%; 
            border: 20px solid #cc0000; margin: 0 auto 30px auto;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: #eee; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .grafik-deger { font-size: 24px; font-weight: bold; color: #111; line-height: 1; }
        .grafik-etiket { font-size: 12px; color: #555; }

        /* Uyarı Kutuları */
        .uyari-kutusu { 
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px);
            border-radius: 15px; padding: 20px; width: 450px; text-align: left;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .uyari-satir { font-size: 14px; color: #333; margin-bottom: 10px; font-weight: 500; }
        
        /* Geri Dön Butonu */
        .geri-btn { margin-top: 20px; background: transparent; border: 1px solid #333; padding: 8px 20px; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Sol Menü -->
    <nav class="sidebar">
        <h2>RAM Kurtarıcıları 🛡️</h2>
        <div class="menu-item">📄 Ana Ekran</div>
        <div class="menu-item">📁 Geçmiş Raporlar</div>
        <div class="menu-item">⚙️ Ayarlar</div>
    </nav>

    <!-- Ana Ekran -->
    <main class="main-content">
        
        <!-- EKRAN 1: Analiz Girdisi -->
        <div id="ekran-1">
            <h1>Yeni Bellek Analizi</h1>
            <div class="input-group">
                <input type="text" id="uygulama-adi" placeholder="Uygulama adını girin: (örn: chrome.exe)">
                <span>⚙️</span>
            </div>
            <button class="baslat-btn" onclick="analiziBaslat()">VALGRIND ANALİZİNİ BAŞLAT</button>
        </div>

        <!-- EKRAN 2: Analiz Sonucu -->
        <div id="ekran-2">
            <h1 id="sonuc-baslik">Analiz Sonucu: chrome.exe</h1>
            <div class="tarih" id="sonuc-tarih">Tarih: Bekleniyor...</div>
            
            <div class="grafik-halka">
                <div class="grafik-deger" id="sizinti-miktari">--</div>
                <div class="grafik-etiket">Bayt Sızıntı</div>
            </div>

            <div class="uyari-kutusu">
                <div class="uyari-satir" id="uyari-1">[UYARI] Veri yükleniyor...</div>
                <div class="uyari-satir" id="uyari-2">Lütfen bekleyin...</div>
            </div>

            <button class="geri-btn" onclick="geriDon()">Geri Dön</button>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
